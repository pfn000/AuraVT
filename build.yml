name: AuraVT CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Build Native Windows Plugin ──────────────────────────────────────────────
  build-windows-plugin:
    name: Build Windows Native Plugin
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          cmake -B NativePlugins/Windows/TransparentWindow/build `
                -S NativePlugins/Windows/TransparentWindow `
                -DCMAKE_BUILD_TYPE=Release

      - name: Build DLL
        run: |
          cmake --build NativePlugins/Windows/TransparentWindow/build `
                --config Release

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: TransparentWindow-dll
          path: UnityProject/Assets/AuraVT/Plugins/Windows/TransparentWindow.dll

  # ── Unity Build (Windows Standalone) ────────────────────────────────────────
  build-unity:
    name: Unity Build (Windows)
    runs-on: ubuntu-latest
    needs: build-windows-plugin

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true    # For .vrm / .dll binary assets

      - name: Download Windows Plugin
        uses: actions/download-artifact@v4
        with:
          name: TransparentWindow-dll
          path: UnityProject/Assets/AuraVT/Plugins/Windows/

      - name: Unity Build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:   ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath:    UnityProject
          targetPlatform: StandaloneWindows64
          buildName:      AuraVT
          buildsPath:     Builds

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: AuraVT-Windows
          path: Builds/

  # ── Release on Tag ───────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-unity
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: AuraVT-Windows
          path: Builds/
      - name: Zip build
        run: zip -r AuraVT-Windows.zip Builds/
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: AuraVT-Windows.zip
          generate_release_notes: true
